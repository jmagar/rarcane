name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Draft release tag to build and publish"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Draft release tag to build and publish, e.g. v0.4.0"
        required: true

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  release-meta:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - id: meta
        name: Resolve draft release
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.tag_name }}"
          test -n "$tag" || { echo "::error::tag_name is required"; exit 1; }
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_name=rarcane ${tag}" >> "$GITHUB_OUTPUT"

  build:
    needs: release-meta
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: rarcane-linux-x86_64
            archive: rarcane-x86_64.tar.gz
            ext: ""
          - target: x86_64-pc-windows-msvc
            artifact: rarcane-windows-x86_64.exe
            archive: rarcane-windows-x86_64.tar.gz
            ext: ".exe"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
        with:
          ref: ${{ needs.release-meta.outputs.tag_name }}
      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - name: Install pinned cross toolchain
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo install cargo-xwin --version 0.23.0 --locked
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.2
        with:
          key: ${{ matrix.target }}
      - name: Build Linux binary
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --locked --target ${{ matrix.target }} --bin rarcane
      - name: Build Windows binary
        if: matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo xwin build --release --locked --target ${{ matrix.target }} --bin rarcane
      - name: Stage artifact and checksum
        shell: bash
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/rarcane${{ matrix.ext }}" "${{ matrix.artifact }}"
          sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          mkdir archive
          cp "${{ matrix.artifact }}" "archive/rarcane${{ matrix.ext }}"
          tar -C archive -czf "${{ matrix.archive }}" "rarcane${{ matrix.ext }}"
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - name: Attest installer-consumed artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            ${{ matrix.artifact }}
            ${{ matrix.archive }}
      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  stage-release-assets:
    needs: [release-meta, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist/release-assets
          merge-multiple: true
      - name: Attach assets while release remains draft
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v2.5.0
        with:
          tag_name: ${{ needs.release-meta.outputs.tag_name }}
          name: ${{ needs.release-meta.outputs.release_name }}
          draft: true
          files: dist/release-assets/*

  npm:
    needs: [release-meta, stage-release-assets]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.0
        with:
          ref: ${{ needs.release-meta.outputs.tag_name }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Verify npm package version matches release tag
        id: npm-version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.release-meta.outputs.tag_name }}"
          version="$(node -p "require('./packages/arcane-rmcp/package.json').version")"
          test "$tag" = "v${version}" || { echo "::error::tag ${tag} does not match npm version ${version}"; exit 1; }
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - run: npm test --prefix packages/arcane-rmcp
      - run: npm run check --prefix packages/arcane-rmcp
      - run: npm pack --dry-run --json ./packages/arcane-rmcp
      - name: Check whether npm version is already published
        id: published
        shell: bash
        run: |
          if npm view "arcane-rmcp@${{ steps.npm-version.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish npm package
        if: steps.published.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public ./packages/arcane-rmcp

  finalize-release:
    needs: [release-meta, npm]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish fully assembled release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-meta.outputs.tag_name }}
        run: gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
