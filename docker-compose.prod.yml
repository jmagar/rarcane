# =============================================================================
# docker-compose.prod.yml — Production deployment template
#
# TEMPLATE: Replace all occurrences of "rarcane" with your service name.
#           Replace all occurrences of "EXAMPLE" with your service name in caps.
#
# Key substitutions:
#   "arcane-rmcp"          -> your Docker service/container name
#   "arcane-rmcp-data"     -> your Docker volume name
#   "ghcr.io/.../rarcane"  -> your published Docker image path
#   port 40110             -> your service's MCP port
#   RARCANE_*              -> your env var prefix
# =============================================================================

name: arcane-rmcp

x-common-service: &common-service
  networks:
    - mcp
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ulimits:
    nofile:
      soft: 65535
      hard: 65535
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      compress: "true"

services:
  arcane-rmcp:
    <<: *common-service
    # TEMPLATE: Replace with your image path.
    image: ghcr.io/your-org/rarcane-mcp:${RARCANE_MCP_VERSION:-latest}
    container_name: arcane-rmcp
    env_file:
      - path: .env
        required: false
    environment:
      RARCANE_MCP_HOST: 0.0.0.0
      RARCANE_MCP_PORT: "40110"
      RARCANE_MCP_SERVER_NAME: arcane-rmcp
      RARCANE_NOAUTH: "true"
    ports:
      - "${RARCANE_MCP_HOST_PORT:-40110}:40110/tcp"
    volumes:
      - ${HOME}/.rarcane:/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:40110/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  arcane-rmcp-data:

networks:
  mcp:
    name: ${DOCKER_NETWORK:-mcp}
    external: true
